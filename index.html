<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">

</head>

<body>

    <div class="container">

        <!-- <h1>BMI Calculator</h1> -->

        <p class="description">
            Check whether your weight is healthy based on your height and weight.
        </p>

        <form id="form">

            <div class="input-group">
                <label>Gender</label>
                <div class="gender">
                    <label><input type="radio" name="gender" id="male"> Male</label>
                    <label><input type="radio" name="gender" id="female"> Female</label>
                </div>
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" id="age" required>
            </div>

            <div class="input-group">
                <label>Height (cm)</label>
                <input type="number" id="height" required>
            </div>

            <div class="input-group">
                <label>Weight (kg)</label>
                <input type="number" id="weight" required>
            </div>

            <button type="button" id="submit">Calculate BMI</button>
            <button type="reset" id="clear">Clear</button>

        </form>

        <div class="result">
            <div class="gaugecontainer">
                <div class="gaugebar">
                    <div id="gaugefill"></div>
                </div>
                <div id="bmitext"></div>
            </div>
        </div>

    </div>

    <script src="index.js"></script>

</body>

</html>
